        // Custom notification helper
        function triggerToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 z-50 flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white font-medium transition-all duration-300 transform translate-y-10 opacity-0 ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`;
            toast.innerHTML = `<span class="material-icons">${type === 'success' ? 'check_circle' : 'error'}</span><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);

    <script>
        // Core View Switcher function
        function changeActiveModule(dept, module) {
            window.erpState.activeDept = dept;
            window.erpState.activeModule = module;
            
            // Re-apply left sidebar styles
            document.querySelectorAll('aside button').forEach(btn => {
                btn.className = "w-full flex items-center gap-3 px-3 py-2 text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-lg transition-all text-left";
            });
            const activeBtn = document.getElementById(`menu-${dept}-${module}`);
            if (activeBtn) {
                activeBtn.className += " module-active";
            }

            // Update breadcrumb and title on working screen
            document.getElementById('workspace-breadcrumb').innerText = `${dept} Department`;
            document.getElementById('workspace-title').innerText = formatTitle(module);

            // Render matching view
            renderActiveModule();
        }

        // Title formatter
        function formatTitle(name) {
            if (name === 'PO_Contract') return 'PO & Contract Agreements';
            if (name === 'MPUtilized') return 'MP / Machinery Run Logs';
            if (name === 'MaterialUtilized') return 'Daily Material Issued';
            if (name === 'ProgressChart') return 'BOM vs Consumption Progress';
            if (name === 'StaffAccess') return 'Staff Security Access Matrix';
            return name;
        }

        // Trigger switch logic
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('dark-mode-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = 'dark_mode';
            } else {
                html.classList.add('dark');
                icon.innerText = 'light_mode';
            }
        }

        // Master Router to render specific RHS templates
        function renderActiveModule() {
            const content = document.getElementById('workspace-content');
            const actions = document.getElementById('workspace-actions');
            
            // Reset both containers
            content.innerHTML = '';
            actions.innerHTML = '';

            const module = window.erpState.activeModule;

            if (module === 'Enquiries') {
                renderEnquiries(content, actions);
            } else if (module === 'Quotation') {
                renderQuotations(content, actions);
            } else if (module === 'PO_Contract') {
                renderContracts(content, actions);
            } else if (module === 'Invoice') {
                renderInvoices(content, actions);
            } else if (module === 'Vouchers') {
                renderVouchers(content, actions);
            } else if (module === 'Pettycash') {
                renderPettyCash(content, actions);
            } else if (module === 'Tax') {
                renderTax(content, actions);
            } else if (module === 'CreditDebit') {
                renderCreditDebit(content, actions);
            } else if (module === 'SOA') {
                renderSOA(content, actions);
            } else if (module === 'BOM') {
                renderBOM(content, actions);
            } else if (module === 'MPUtilized') {
                renderMPUtilized(content, actions);
            } else if (module === 'MaterialUtilized') {
                renderMaterialUtilized(content, actions);
            } else if (module === 'ProgressChart') {
                renderProgressChart(content, actions);
            } else if (module === 'Employees') {

            if(!contractId || taxable <= 0) {
                triggerToast('Please provide valid progressive value!', 'error');
                return;
            }

            const cgst = taxable * 0.09;
            const sgst = taxable * 0.09;
            const total = taxable + cgst + sgst;

            const newId = `INV-2026-${String(window.erpState.invoices.length + 301).padStart(3, '0')}`;
            window.erpState.invoices.push({
                id: newId,
                date: new Date().toISOString().split('T')[0],
                contractId,
                taxable,
                cgst,
                sgst,
                total,
                status: 'Unpaid'
            });

            document.getElementById('invoice-modal').remove();
            triggerToast('Progressive tax invoice successfully posted.');

        function renderProgressChart(container, actionContainer) {
            const filter = window.erpState.progressFilter;
            actionContainer.innerHTML = `
                <div class="inline-flex rounded-md shadow-sm" role="group">
                    <button onclick="changeProgressFilter('Day')" class="px-4 py-2 text-xs font-semibold ${filter === 'Day' ? 'bg-primary text-white' : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-800 hover:bg-slate-50'} rounded-l-md">
                        Day Progress
                    </button>
                    <button onclick="changeProgressFilter('Week')" class="px-4 py-2 text-xs font-semibold ${filter === 'Week' ? 'bg-primary text-white' : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 border-t border-b border-slate-200 dark:border-slate-800 hover:bg-slate-50'}">
                        Weekly Run
                    </button>
                    <button onclick="changeProgressFilter('Month')" class="px-4 py-2 text-xs font-semibold ${filter === 'Month' ? 'bg-primary text-white' : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-800 hover:bg-slate-50'} rounded-r-md">
                        Monthly View
                    </button>
                </div>
            `;

            // Calculate overall efficiency
            let totalBOM = 0;
            let totalActual = 0;
            window.erpState.bom.forEach(b => {
                totalBOM += b.estimate;
                totalActual += b.actual;
            });
            const netProgressPercent = Math.min(100, Math.round((totalActual / totalBOM) * 100));

            // Setup mock data metrics based on filter
            let factor = filter === 'Day' ? 1.0 : filter === 'Week' ? 7.2 : 30.5;
            let totalConduits = Math.round(1300 * factor);
            let consumedConduits = Math.round(1250 * factor);
            let conduitsPercentage = Math.round((consumedConduits/totalConduits) * 100);

            let totalPipes = Math.round(900 * factor);
            let consumedPipes = Math.round(870 * factor);
            let pipesPercentage = Math.round((consumedPipes/totalPipes) * 100);

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm">

                        <div class="text-2xl font-bold text-primary dark:text-sky-400">${filter === 'Day' ? 'Today (Daily Track)' : filter === 'Week' ? 'Last 7 Days (Weekly Run)' : 'Current Billing Month'}</div>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm">
                        <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Combined BOM Target Burn-Rate</div>
                        <div class="text-2xl font-bold text-slate-800 dark:text-slate-100">${netProgressPercent}% Capacity Exhausted</div>
                    </div>
                </div>

                <!-- Custom High-Contrast CSS Visual bar chart instead of massive JS chart engines for ultimate compatibility -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-sm space-y-6">
                    <h3 class="text-lg font-bold mb-4">Material Target Consumption Comparison Chart</h3>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="font-bold">25mm PVC Conduit Cable Lines</span>
                            <span class="text-slate-500 font-medium">BOM Allocated: ${totalConduits} Rmt | Consumed: <b class="text-primary dark:text-sky-400">${consumedConduits} Rmt</b> (${conduitsPercentage}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 dark:bg-slate-800 h-6 rounded-lg overflow-hidden relative flex items-center">
                            <div class="h-full bg-primary/20 dark:bg-sky-400/20" style="width: 100%; position:absolute; left:0;"></div>
                            <div class="h-full bg-primary" style="width: ${conduitsPercentage}%; position:absolute; left:0; z-index:1;"></div>
                            <span class="text-xs text-white dark:text-slate-900 font-extrabold px-3 z-10 select-none">Actual Consumption Run Line</span>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="font-bold">1-inch CPVC Sanitary Fittings Pipe</span>
                            <span class="text-slate-500 font-medium">BOM Allocated: ${totalPipes} Rmt | Consumed: <b class="text-emerald-500">${consumedPipes} Rmt</b> (${pipesPercentage}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 dark:bg-slate-800 h-6 rounded-lg overflow-hidden relative flex items-center">
                            <div class="h-full bg-emerald-500/20" style="width: 100%; position:absolute; left:0;"></div>

                        </div>
                    </div>
                </div>
            `;
        }

                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1">Daily Wages Rate (INR)</label>
                            <input id="emp-rate" type="number" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-lg p-2 text-sm" placeholder="e.g., 600">
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button onclick="document.getElementById('emp-modal').remove()" class="px-4 py-2 text-sm border dark:border-slate-700 rounded-lg">Cancel</button>
                        <button onclick="submitNewEmployee()" class="bg-primary text-white px-4 py-2 text-sm font-semibold rounded-lg">Register Staff</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function submitNewEmployee() {
            const name = document.getElementById('emp-name').value;
            const role = document.getElementById('emp-role').value;
            const rate = parseFloat(document.getElementById('emp-rate').value || 0);

            if(!name || !role || rate <= 0) {
                triggerToast('Please provide valid worker parameters!', 'error');
                return;
            }

            const newId = `EMP-${String(window.erpState.employees.length + 1).padStart(3, '0')}`;
            window.erpState.employees.push({
                id: newId, name, role, rate
            });

            document.getElementById('emp-modal').remove();
            triggerToast('New Employee added to onsite system payroll master.');
            renderActiveModule();
        }

        // 15. HR & PAYROLL - DAILY ATTENDANCE
        function renderAttendance(container, actionContainer) {
            const date = window.erpState.currentAttendanceDate;
            actionContainer.innerHTML = `
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-slate-400">Current Date Context:</label>
                    <input type="date" value="${date}" onchange="changeAttendanceDate(this.value)" class="bg-white dark:bg-slate-950 border dark:border-slate-800 text-sm font-semibold p-1.5 rounded-lg">
                </div>
            `;

            // Pull status array
            const dailyAttendanceObj = window.erpState.attendance[date] || {};

            let rosterRows = '';
            window.erpState.employees.forEach((emp) => {
                const isPresent = dailyAttendanceObj[emp.id] !== undefined ? dailyAttendanceObj[emp.id] : false;
                rosterRows += `
                    <tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50/50">
                        <td class="p-4 font-semibold text-xs text-slate-500">${emp.id}</td>
                        <td class="p-4 text-sm font-semibold">${emp.name}</td>
                        <td class="p-4 text-xs font-medium uppercase text-slate-400">${emp.role}</td>
                        <td class="p-4">
                            <label class="relative inline-flex items-center cursor-pointer select-none">
                                <input type="checkbox" ${isPresent ? 'checked' : ''} onchange="toggleAttendanceCheckbox('${emp.id}')" class="sr-only peer">
                                <div class="w-11 h-6 bg-slate-200 dark:bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:width-5 after:transition-all peer-checked:bg-emerald-500"></div>
                                <span class="ml-3 text-xs font-bold ${isPresent ? 'text-emerald-500' : 'text-rose-500'}">${isPresent ? 'PRESENT' : 'ABSENT'}</span>
                            </label>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Worker ID</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Onsite Worker Name</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Primary Trade Skill</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Marker Switch (Click to Check-In)</th>
                            </tr>
                        </thead>
                        <tbody>${rosterRows}</tbody>
                    </table>
                </div>
            `;
        }

        function changeAttendanceDate(val) {
            window.erpState.currentAttendanceDate = val;
            if(!window.erpState.attendance[val]) {
                // Initialize clean attendance mapping
                window.erpState.attendance[val] = {};
            }
            renderActiveModule();
        }

        function toggleAttendanceCheckbox(empId) {
            const date = window.erpState.currentAttendanceDate;
            if(!window.erpState.attendance[date]) {
                window.erpState.attendance[date] = {};
            }
            const current = window.erpState.attendance[date][empId];
            window.erpState.attendance[date][empId] = !current;
            triggerToast(`Attendance updated for selected day context.`);
            renderActiveModule();
        }

        // 16. HR & PAYROLL - SITE PAYROLL CALCULATIONS
        function renderPayroll(container, actionContainer) {
            // Aggregate attendance days per employee for the last month mock run
            let tableRows = '';
            window.erpState.employees.forEach((emp) => {
                // Mock calculation helper
                let shiftsWorked = 18; // base monthly mock run shifts
                let netPayable = emp.rate * shiftsWorked;
                tableRows += `
                    <tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50/50">
                        <td class="p-4 font-semibold text-xs text-slate-500">${emp.id}</td>
                        <td class="p-4 text-sm font-bold text-slate-800 dark:text-slate-100">${emp.name}</td>
                        <td class="p-4 text-sm font-semibold uppercase text-slate-400">${emp.role}</td>
                        <td class="p-4 text-sm font-bold">₹ ${emp.rate.toLocaleString('en-IN')}</td>
                        <td class="p-4 text-sm font-medium text-emerald-500">${shiftsWorked} Shifts Completed</td>
                        <td class="p-4 text-sm font-bold text-primary dark:text-sky-400">₹ ${netPayable.toLocaleString('en-IN')}</td>
                        <td class="p-4">
                            <button onclick="simulatePaySlips('${emp.name}', ${emp.rate}, ${shiftsWorked})" class="text-xs font-bold text-primary dark:text-sky-400 border border-primary/20 hover:border-primary px-3 py-1.5 rounded-lg">View Payslip</button>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Worker ID</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Employee Name</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Trade Skill</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Wages Shift Rate</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Active Total Shifts</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Net Salary Payables</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Simulations</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
            `;
        }

        function simulatePaySlips(name, rate, shifts) {
            const val = rate * shifts;
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4";
            overlay.id = "payslip-modal";
            overlay.innerHTML = `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6 w-full max-w-sm shadow-2xl">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><span class="material-icons text-primary">monetization_on</span> Worker Shift Payslip</h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between border-b pb-2 dark:border-slate-800">
                            <span class="text-slate-400 font-medium">Worker Name:</span>
                            <span class="font-bold">${name}</span>
                        </div>
                        <div class="flex justify-between border-b pb-2 dark:border-slate-800">
                            <span class="text-slate-400 font-medium">Shift Wage Rate:</span>
                            <span class="font-bold">₹ ${rate} / day</span>
                        </div>
                        <div class="flex justify-between border-b pb-2 dark:border-slate-800">
                            <span class="text-slate-400 font-medium">Shifts Settled:</span>
                            <span class="font-bold">${shifts} Shifts</span>
                        </div>
                        <div class="flex justify-between pt-2">
                            <span class="font-bold">Net Salary Payable:</span>
                            <span class="font-black text-rose-500 text-lg">₹ ${val.toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button onclick="document.getElementById('payslip-modal').remove()" class="bg-primary text-white px-4 py-2 text-sm font-semibold rounded-lg w-full">Close Payslip Window</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        // 17. ADMIN SYSTEM - STAFF ACCESS FLOW MATRIX
        function renderStaffAccess(container, actionContainer) {
            let roleRows = '';
            Object.keys(window.erpState.accessFlow).forEach((role) => {
                const rules = window.erpState.accessFlow[role];
                roleRows += `
                    <tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50/50">
                        <td class="p-4 font-bold text-sm text-slate-800 dark:text-slate-200">${role}</td>
                        <td class="p-4 text-center">
                            <span class="material-icons text-lg ${rules.sales ? 'text-emerald-500' : 'text-rose-500'}">
                                ${rules.sales ? 'verified' : 'cancel'}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="material-icons text-lg ${rules.accounts ? 'text-emerald-500' : 'text-rose-500'}">
                                ${rules.accounts ? 'verified' : 'cancel'}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="material-icons text-lg ${rules.operations ? 'text-emerald-500' : 'text-rose-500'}">
                                ${rules.operations ? 'verified' : 'cancel'}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="material-icons text-lg ${rules.hr ? 'text-emerald-500' : 'text-rose-500'}">
                                ${rules.hr ? 'verified' : 'cancel'}
                            </span>
                        </td>
                        <td class="p-4">
                            <button onclick="toggleStaffModuleRules('${role}')" class="text-xs bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 px-3 py-1.5 rounded-lg font-semibold">Alter Permissions</button>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = `
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Staff Role Profile</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">Sales Access</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">Accounts Access</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">Operations Access</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">HR & Payroll Access</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${roleRows}</tbody>
                    </table>
                </div>
            `;
        }

        function toggleStaffModuleRules(role) {
            // Prompt matrix rules toggler
            const mod = prompt(`Toggle access parameters: Enter 'Sales', 'Accounts', 'Operations', or 'HR' to invert role rights for ${role}:`);
            if(mod) {
                const key = mod.trim().toLowerCase();
                if(key === 'sales' || key === 'accounts' || key === 'operations' || key === 'hr') {
                    const current = window.erpState.accessFlow[role][key];
                    window.erpState.accessFlow[role][key] = !current;
                    triggerToast(`Role access settings updated for ${role}.`);
                    renderActiveModule();
                } else {
                    triggerToast('Invalid department key requested!', 'error');
                }
            }
        }

        // --- MASTER SYSTEM INITIALIZER ON WINDOW LOAD ---
        window.onload = function () {
            // Render default view Enquiries
            changeActiveModule('Sales', 'Enquiries');
        }
    </script>
</body>
</html>
